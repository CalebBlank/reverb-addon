name: Recipearr
version: "1.2.2"
slug: recipearr
description: >-
  An "*arr" for recipes: watches recipe RSS/Atom feeds, filters by keyword,
  enriches, and imports into Tandoor. Configure Tandoor + sources in the web UI.
url: https://github.com/CalebBlank/reverb-addon
arch:
  - aarch64
# Single static binary in a distroless image with its own entrypoint — no s6 init.
init: false
# Ingress: shows Recipearr as a sidebar tile behind HA's auth + proxy, so it works on the LAN,
# remotely (Nabu Casa), and in the mobile app — no exposed port needed. The UI now uses relative
# /api paths, so it rides the ingress base path correctly.
ingress: true
ingress_port: 8585
panel_icon: mdi:silverware-fork-knife
panel_title: Recipearr
# Also keep the raw port available for direct LAN access / bookmarks (optional).
ports:
  "8585/tcp": 8585
ports_description:
  "8585/tcp": Recipearr web UI (direct LAN access; ingress is preferred)
