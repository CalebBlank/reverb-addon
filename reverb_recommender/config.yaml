name: Reverb Recommender
version: "0.1.10"
slug: reverb_recommender
description: >-
  Related-articles recommender for the Reverb RSS reader. Builds a TF-IDF index
  over your FreshRSS reading-list and serves "related coverage" recommendations
  (preferring other sources) to both the Reverb Android app and the web reader.
url: https://github.com/CalebBlank/reverb-addon
arch:
  - aarch64
  - amd64
# The app reads /data/options.json itself and starts its own HTTP server.
init: false
# This is a plain JSON API (not a UI), so no ingress — expose the port directly.
ports:
  "8100/tcp": 8100
ports_description:
  "8100/tcp": Recommender HTTP API (GET /related, GET /health)
# The FreshRSS add-on's reachable base URL — the SAME host:port you point Reverb
# (and the Reverb Reader add-on) at, WITHOUT the /api/greader.php path.
# Example: http://192.168.1.50:7077
options:
  freshrss_upstream: ""
  username: ""
  api_password: ""
  refresh_minutes: 20
  corpus_size: 1000
  k_default: 8
  # Extra external RSS/Atom feed URLs to widen the recommendation corpus beyond
  # your own subscriptions (newline- and/or comma-separated). These are MERGED
  # with a built-in curated default list, so leaving this blank still pulls from
  # the defaults. Articles from these feeds can be recommended and open in-reader.
  external_feeds: ""
  # Optional Bluesky read-only creds for the article "Discussions" feature (find
  # posts that linked an article). Use a Bluesky APP PASSWORD (Settings -> App
  # Passwords), NOT your account password. Leave blank for Hacker-News-only.
  bluesky_handle: ""
  bluesky_app_password: ""
schema:
  freshrss_upstream: str
  username: str
  api_password: password
  refresh_minutes: int(1,)
  corpus_size: int(10,)
  k_default: int(1,50)
  external_feeds: str?
  bluesky_handle: str?
  bluesky_app_password: password?
