                // ── Related articles (async keyword search) ──
                const relatedH3 = document.createElement("h3");
                if (linked.length > 0) relatedH3.className = "section-gap";
                relatedH3.textContent = "Related Articles";
                panel.appendChild(relatedH3);

                const title = getText(item, "title");
                const desc = stripHtml(
                    getText(
                        item,
                        "description",
                        "summary",
                        "content:encoded",
                        "content",
                    ),
                );
                const rawText = title + " " + desc;
                const properNouns = extractProperNouns(rawText);
                const keywords = extractKeywords(rawText);
                if (!properNouns.length && !keywords.length) {
                    panel.appendChild(
                        Object.assign(document.createElement("div"), {
                            className: "placeholder",
                            textContent: "No keywords found.",
                        }),
                    );
                    return;
                }

                const placeholder = Object.assign(
                    document.createElement("div"),
                    { className: "placeholder", textContent: "Searching…" },
                );
                panel.appendChild(placeholder);

                const seenTitles = new Set();
                const allResults = [];
                const currentGenres =
                    (currentFeedCategory &&
                        CATEGORY_GENRES[currentFeedCategory]) ||
                    [];

                // Web news feeds
                await Promise.allSettled(
                    WEB_NEWS_FEEDS.map(async (feed) => {
                        const feedGenres = feed.genres || [];
                        const genreMatch =
                            currentGenres.length > 0 &&
                            feedGenres.some((g) => currentGenres.includes(g));
                        try {
                            const xml = await fetchFeed(feed.url);
                            if (!panel.isConnected) return;
                            const doc = new DOMParser().parseFromString(
                                xml,
                                "text/xml",
                            );
                            for (const candidate of [
                                ...doc.querySelectorAll("item, entry"),
                            ]) {
                                const ct = getText(
                                    candidate,
                                    "title",
                                ).toLowerCase();
                                const cd = stripHtml(
                                    getText(
                                        candidate,
                                        "description",
                                        "summary",
                                    ),
                                ).toLowerCase();
                                const score = scoreRelevance(
                                    properNouns,
                                    keywords,
                                    ct,
                                    cd,
                                    genreMatch,
                                );
                                if (score === 0) continue;
                                const t = getText(candidate, "title");
                                if (seenTitles.has(t.toLowerCase())) continue;
                                seenTitles.add(t.toLowerCase());
                                const link = getLink(candidate);
                                allResults.push({
                                    title: t,
                                    source: feed.title,
                                    date: getText(
                                        candidate,
                                        "pubDate",
                                        "published",
                                        "updated",
                                    ),
                                    image: getImage(candidate),
                                    score,
                                    domain: feedDomain(feed),
                                    onClick: () => window.open(link, "_blank"),
                                });
                            }
                        } catch (e) {}
                    }),
                );

                if (!panel.isConnected) return;
                placeholder.remove();
                allResults.sort((a, b) => b.score - a.score);

                if (allResults.length === 0) {
                    panel.appendChild(
                        Object.assign(document.createElement("div"), {
                            className: "placeholder",
                            textContent: "No related articles found.",
                        }),
                    );
                    return;
                }
                const relatedContainer = document.createElement("div");
                panel.appendChild(relatedContainer);
                allResults
                    .slice(0, 8)
                    .forEach((r) =>
                        appendRelatedItem(
                            relatedContainer,
                            r.title,
                            r.source,
                            r.date,
                            r.image,
                            r.onClick,
                            r.domain,
                        ),
                    );
            }

            // ── Article content extractor (semantic selectors + density scoring) ──
            function extractArticleContent(html, url) {
                const doc = new DOMParser().parseFromString(html, "text/html");

                doc.querySelectorAll(
                    "script,style,noscript," +
                        'button,input[type="button"],input[type="submit"],input[type="email"],[role="button"]',
                ).forEach((el) => el.remove());
                doc.querySelectorAll("*").forEach((node) => {
                    [...node.attributes].forEach((attr) => {
                        if (attr.name.startsWith("on"))
                            node.removeAttribute(attr.name);
                    });
                });

                const selectors = [
                    '[itemprop="articleBody"]',
                    "article",
                    '[class*="article-body"]',
                    '[class*="article__body"]',
                    '[class*="article-content"]',
                    '[class*="post-body"]',
                    '[class*="post-content"]',
                    '[class*="post__content"]',
                    '[class*="entry-content"]',
                    '[class*="story-body"]',
                    '[class*="story__body"]',
                    '[class*="body-text"]',
                    '[id*="article-body"]',
                    '[id*="post-body"]',
                    "main",
                ];
                let found = null;
                for (const sel of selectors) {
                    try {
                        const el = doc.querySelector(sel);
                        if (el && el.textContent.trim().length > 300) {
                            found = el;
                            break;
                        }
                    } catch (e) {}
                }
                if (!found) {
                    let bestScore = 0;
                    doc.querySelectorAll("div, section").forEach((el) => {
                        const text = el.textContent.trim().length;
                        if (text < 300) return;
                        const score =
                            (text * text) / Math.max(el.innerHTML.length, 1);
                        if (score > bestScore) {
                            bestScore = score;
                            found = el;
                        }
                    });
                }
                if (!found) return null;

                try {
                    const base = new URL(url);
                    found.querySelectorAll("img[src]").forEach((img) => {
                        try {
                            img.src = new URL(
                                img.getAttribute("src"),
                                base,
                            ).href;
                        } catch (e) {}
                        img.removeAttribute("width");
                        img.removeAttribute("height");
                        img.removeAttribute("style");
                    });
                    found.querySelectorAll("a[href]").forEach((a) => {
                        try {
                            a.setAttribute(
                                "href",
                                new URL(a.getAttribute("href"), base).href,
                            );
                        } catch (e) {}
                        a.setAttribute("target", "_blank");
                        a.setAttribute("rel", "noopener");
                    });
                } catch (e) {}

                return found.innerHTML;
            }

            // ── Full article fetcher ──
            async function fetchFullArticle(url) {
                const proxies = [
                    `https://corsproxy.io/?${encodeURIComponent(url)}`,
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
                ];

                let html;
                try {
                    const res = await Promise.any(
                        proxies.map((p) =>
                            fetch(p).then((r) => {
                                if (!r.ok) throw new Error();
                                return r;
                            }),
                        ),
                    );
                    html = await res.text();
                } catch (e) {
                    return null;
                }

                const doc = new DOMParser().parseFromString(html, "text/html");

                // Remove non-visible and interactive noise
                doc.querySelectorAll(
                    "script,style,noscript," +
                        'button,input[type="button"],input[type="submit"],input[type="email"],[role="button"]',
                ).forEach((el) => el.remove());

                // Remove event handlers
                doc.querySelectorAll("*").forEach((node) => {
                    [...node.attributes].forEach((attr) => {
                        if (attr.name.startsWith("on"))
                            node.removeAttribute(attr.name);
                    });
                });

                // Resolve relative URLs and strip explicit dimensions from images
                try {
                    const base = new URL(url);
                    doc.querySelectorAll("img[src]").forEach((img) => {
                        try {
                            img.src = new URL(
                                img.getAttribute("src"),
                                base,
                            ).href;
                        } catch (e) {}
                        img.removeAttribute("width");
                        img.removeAttribute("height");
                        img.removeAttribute("style");
                    });
                    doc.querySelectorAll("a[href]").forEach((a) => {
                        try {
                            a.setAttribute(
                                "href",
                                new URL(a.getAttribute("href"), base).href,
                            );
                        } catch (e) {}
                        a.setAttribute("target", "_blank");
                        a.setAttribute("rel", "noopener");
                    });
                } catch (e) {}

                return doc.body.innerHTML;
            }

            function fixEmbeds(el) {
                el.querySelectorAll("iframe").forEach((iframe) => {
                    const src = iframe.getAttribute("src") || "";
                    if (src.includes("youtube.com/embed")) {
                        iframe.setAttribute(
                            "src",
                            src.replace(
                                "youtube.com/embed",
                                "youtube-nocookie.com/embed",
                            ),
                        );
                    }
                    iframe.setAttribute(
                        "allow",
                        "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share",
                    );
                    iframe.setAttribute("allowfullscreen", "");
                    if (
                        !iframe.getAttribute("height") &&
                        !iframe.style.height
                    ) {
                        iframe.style.aspectRatio = "16/9";
                        iframe.style.width = "100%";
                        iframe.style.height = "";
                    }
                });
            }

            function setBodyHtml(el, html) {
                el.innerHTML = html;
                fixEmbeds(el);
            }

            // ── Article parallax ──
            function initArticleParallax() {
                const scroll = document.getElementById("right-scroll");
                const body = document.getElementById("article-body");
                if (!scroll || !body) return;
                [...body.querySelectorAll("img")].forEach(img => {
                    if (img.closest(".parallax-frame")) return;
                    const frame = document.createElement("div");
                    frame.className = "parallax-frame";
                    img.parentNode.insertBefore(frame, img);
                    frame.appendChild(img);
                });
                const update = () => {
                    if (scroll.scrollHeight <= scroll.clientHeight) return;
                    const scrollRect = scroll.getBoundingClientRect();
                    const ch = scroll.clientHeight || 1;
                    body.querySelectorAll(".parallax-frame img").forEach(img => {
                        const frame = img.parentElement;
                        const rect = frame.getBoundingClientRect();
                        const frameCenter = rect.top - scrollRect.top + rect.height / 2;
                        const progress = (frameCenter - ch / 2) / ch;
                        img.style.transform = `translateY(${progress * 40}px)`;
                    });
                };
                if (scroll._parallaxHandler) scroll.removeEventListener("scroll", scroll._parallaxHandler);
                let ticking = false;
                const handler = () => {
                    if (!ticking) {
                        ticking = true;
                        requestAnimationFrame(() => { update(); ticking = false; });
                    }
                };
                scroll._parallaxHandler = handler;
                scroll.addEventListener("scroll", handler, { passive: true });
                requestAnimationFrame(update);
            }

            // ── Show article ──
            function showArticle(
                item,
                cardEl,
                link,
                source,
                sourceRgb,
                domain,
            ) {
                document
                    .querySelectorAll(".article-item, .featured-card")
                    .forEach((el) => {
                        el.classList.remove("active");
                        el.style.removeProperty("--card-accent");
                    });
                cardEl.classList.add("active");
                const applyCardAccent = (rgb) => {
                    if (rgb && cardEl.classList.contains("active"))
                        cardEl.style.setProperty(
                            "--card-accent",
                            `rgb(${rgb})`,
                        );
                };
                if (sourceRgb) applyCardAccent(sourceRgb);
                else if (domain) resolveColor(domain).then(applyCardAccent);

                const title = getText(item, "title");
                const date = getText(item, "pubDate", "published", "updated");
                const content = getContent(item);
                const href = link || getLink(item);
                const src = source || getItemSource(item);

                document.getElementById("reading-controls").style.display = "";
                document.getElementById("article-pane").innerHTML = `
                    ${src ? `<div id="article-source">${escapeHtml(src)}</div>` : ""}
                    <div id="article-title">${escapeHtml(title)}</div>
                    <div id="article-meta">${formatDate(date)}</div>
                    ${href ? `<a id="article-link" href="${href}" target="_blank">Open original ↗</a>` : ""}
                    <div id="article-body">${content}</div>
                `;
                initArticleParallax();

                // Shared blurred backdrop behind both panes = this article's
                // hero image, tinted with the source color (resolved below).
                const heroImage = getImage(item);
                setArticleBackdrop(
                    heroImage,
                    sourceRgb || domainColorCache[domain] || null,
                );

                // Apply complement glow to right panel, resolve color if needed
                const rightEl = document.getElementById("right");
                const applyGlow = (dom) => {
                    let comp = domainComplementCache[dom];
                    // Backfill complement from existing dominant if missing
                    if (!comp && domainColorCache[dom]) {
                        saveDomainColor(dom, domainColorCache[dom]);
                        comp = domainComplementCache[dom];
                    }
                    if (comp) {
                        rightEl.style.setProperty(
                            "--panel-complement-glow",
                            `rgba(${comp}, 0.28)`,
                        );
                        rightEl.style.setProperty(
                            "--panel-complement-glow-dim",
                            `rgba(${comp}, 0.14)`,
                        );
                    }
                    const dominant = domainColorCache[dom];
                    if (dominant) {
                        rightEl.style.setProperty(
                            "--article-source-rgb",
                            dominant,
                        );
                        document.body.style.setProperty(
                            "--article-accent",
                            `rgb(${dominant})`,
                        );
                        document.body.classList.add("has-article-accent");
                        // Settle the shared article backdrop on the resolved
                        // source color (covers the async resolveColor path).
                        tintArticleBackdrop(dominant);
                    } else {
                        document.body.classList.remove("has-article-accent");
                    }
                };
                if (domain) {
                    if (
                        domainColorCache[domain] ||
                        domainComplementCache[domain]
                    ) {
                        applyGlow(domain);
                    } else {
                        rightEl.style.removeProperty("--panel-complement-glow");
                        rightEl.style.removeProperty(
                            "--panel-complement-glow-dim",
                        );
                        resolveColor(domain).then(() => applyGlow(domain));
                    }
                } else {
                    rightEl.style.removeProperty("--panel-complement-glow");
                    rightEl.style.removeProperty("--panel-complement-glow-dim");
                    rightEl.style.removeProperty("--article-source-rgb");
                    document.body.style.removeProperty("--article-accent");
                    document.body.classList.remove("has-article-accent");
                }

                currentArticleItem = item;
                if (window.innerWidth < 1400) {
                    openNarrowArticle(item);
                } else if (
                    document
                        .getElementById("detail-panel")
                        .classList.contains("open")
                ) {
                    loadRelatedArticles(item);
                }

                const avtToggle = document.getElementById(
                    "article-view-toggle",
                );
                const avtFeed = document.getElementById("avt-feed");
                const avtFull = document.getElementById("avt-full");

                if (href) {
                    avtToggle.style.display = "";
                    const bodyEl = document.getElementById("article-body");
                    fixEmbeds(bodyEl);
                    const feedHtml = content;
                    let fullHtml = null,
                        fetchPromise = null;

                    const getFetched = () => {
                        if (!fetchPromise)
                            fetchPromise = fetchFullArticle(href);
                        return fetchPromise;
                    };
                    const setActive = (btn) =>
                        [avtFeed, avtFull].forEach((b) =>
                            b.classList.toggle("active", b === btn),
                        );
                    const showLoading = () => {
                        bodyEl.innerHTML =
                            '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">Loading…</div>';
                    };

                    setActive(avtFeed);
                    avtFeed.disabled = false;
                    avtFull.disabled = false;

                    const getCleanLevel = () =>
                        parseInt(localStorage.getItem("rc-clean") || "2");

                    avtFeed.onclick = () => {
                        setActive(avtFeed);
                        setBodyHtml(bodyEl, feedHtml);
                        _reapplyClean = null;
                    };

                    avtFull.onclick = () => {
                        if (avtFull.classList.contains("active")) return;
                        setActive(avtFull);
                        if (fullHtml) {
                            setBodyHtml(
                                bodyEl,
                                cleanArticleHtml(fullHtml, getCleanLevel()),
                            );
                            _reapplyClean = () =>
                                setBodyHtml(
                                    bodyEl,
                                    cleanArticleHtml(fullHtml, getCleanLevel()),
                                );
                            return;
                        }
                        showLoading();
                        _reapplyClean = null;
                        avtFull.disabled = true;
                        getFetched()
                            .then((html) => {
                                fullHtml = html;
                                avtFull.disabled = false;
                                if (avtFull.classList.contains("active")) {
                                    setBodyHtml(
                                        bodyEl,
                                        cleanArticleHtml(
                                            fullHtml,
                                            getCleanLevel(),
                                        ),
                                    );
                                    _reapplyClean = () =>
                                        setBodyHtml(
                                            bodyEl,
                                            cleanArticleHtml(
                                                fullHtml,
                                                getCleanLevel(),
                                            ),
                                        );
                                }
                            })
                            .catch(() => {
                                avtFull.disabled = false;
                                if (avtFull.classList.contains("active"))
                                    bodyEl.innerHTML =
                                        '<div style="font-size:13px;color:#d83020;padding:8px 0;">Failed to load article.</div>';
                            });
                    };
                } else {
                    avtToggle.style.display = "none";
                    _reapplyClean = null;
                }
            }

            // ── Fetch via parallel proxies ──
            const _fetchInFlight = new Map();
            async function fetchFeed(url) {
                // Deduplicate concurrent fetches for the same URL so featured
                // and main-feed loads don't double-hit the proxies.
                if (_fetchInFlight.has(url)) return _fetchInFlight.get(url);

                // Connected to FreshRSS: synthesize RSS XML from the server's
                // stream items so the entire downstream pipeline is reused.
                if (GReader.isConnected()) {
                    const grPromise = (async () => {
                        const streamId = feedStreamIds[url];
                        if (!streamId) return grItemsToRssXml([]);
                        return grItemsToRssXml(
                            await GReader.streamItems(streamId, 40),
                        );
                    })();
                    _fetchInFlight.set(url, grPromise);
                    grPromise.finally(() => _fetchInFlight.delete(url));
                    return grPromise;
                }

                const proxies = [
                    (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
                    (u) =>
                        `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
                    (u) =>
                        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
                ];

                const tryProxy = async (makeUrl) => {
                    const controller = new AbortController();
                    const timer = setTimeout(() => controller.abort(), 6000);
                    try {
                        const res = await fetch(makeUrl(url), {
                            signal: controller.signal,
                        });
                        clearTimeout(timer);
                        if (!res.ok) throw new Error(res.status);
                        const text = await res.text();
                        if (!text.trimStart().startsWith("<"))
                            throw new Error("not xml");
                        return text;
                    } catch (e) {
                        clearTimeout(timer);
                        throw e;
                    }
                };

                const promise = Promise.any(proxies.map(tryProxy));
                _fetchInFlight.set(url, promise);
                promise.finally(() => _fetchInFlight.delete(url));
                return promise;
            }

            // ── Helpers ──
            function getText(item, ...tags) {
                for (const tag of tags) {
                    const el = item.querySelector(tag);
                    if (el?.textContent.trim()) return el.textContent.trim();
                }
                return "";
            }

            function getLink(item) {
                const el = item.querySelector("link");
                if (!el) return "";
                return el.getAttribute("href") || el.textContent.trim();
            }

            function getContent(item) {
                return (
                    item.getElementsByTagName("content:encoded")[0]
                        ?.textContent ||
                    getText(item, "content", "description", "summary")
                );
            }

            function getImage(item) {
                const media = item.getElementsByTagName("media:content")[0];
                if (media?.getAttribute("url"))
                    return media.getAttribute("url");

                const enc = item.querySelector("enclosure[type^='image']");
                if (enc?.getAttribute("url")) return enc.getAttribute("url");

                const html =
                    getContent(item) || getText(item, "description", "summary");
                const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
                if (match) return match[1];

                return null;
            }

            function stripHtml(html) {
                return html
                    .replace(/<[^>]+>/g, "")
                    .replace(/\s+/g, " ")
                    .trim();
            }

            function escapeHtml(str) {
                return str
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            function formatDate(str) {
                if (!str) return "";
                const d = new Date(str);
                if (isNaN(d)) return str;
                const diff = Date.now() - d.getTime();
                if (diff < 86_400_000)
                    return d.toLocaleTimeString(undefined, {
                        hour: "numeric",
                        minute: "2-digit",
                        hour12: true,
                    });
                return d.toLocaleDateString(undefined, {
                    year: "numeric",
                    month: "short",
                    day: "numeric",
                });
            }

            // ── Resize handles ──
            function makeResizable(handle, onMove, panelEls = []) {
                handle.addEventListener("mousedown", function (e) {
                    e.preventDefault();
                    handle.classList.add("dragging");
                    panelEls.forEach(
                        (el) => el && (el.style.transition = "none"),
                    );
                    document.addEventListener("mousemove", onMove);
                    document.addEventListener(
                        "mouseup",
                        function () {
                            handle.classList.remove("dragging");
                            panelEls.forEach(
                                (el) => el && (el.style.transition = ""),
                            );
                            document.removeEventListener("mousemove", onMove);
                        },
                        { once: true },
                    );
                });
            }

            const detailPanel = document.getElementById("detail-panel");

            // Returns the right margin of #right (40px) + total space occupied by detail panel
            function detailOccupied() {
                const isOpen = detailPanel.classList.contains("open");
                return 40 + (isOpen ? detailPanel.offsetWidth + 40 : 0);
            }

            makeResizable(
                document.getElementById("handle-left"),
                function (e) {
                    const leftEl = document.getElementById("left");
                    if (leftEl.classList.contains("collapsed")) return;
                    leftEl.style.width = Math.max(0, e.clientX) + "px";
                },
                [document.getElementById("left")],
            );

            makeResizable(
                document.getElementById("handle-right"),
                function (e) {
                    const rightEdge =
                        document.body.clientWidth - detailOccupied();
                    document.getElementById("right").style.width =
                        Math.max(100, rightEdge - e.clientX) + "px";
                },
                [document.getElementById("right")],
            );

            makeResizable(
                document.getElementById("handle-right-split"),
                function (e) {
                    const rightEl = document.getElementById("right");

                        e.clientX - rightEl.getBoundingClientRect().left,
                    );

                            160,
                            document.body.clientWidth - e.clientX - 40,
                        );

                        document.getElementById("detail-scroll").style.width =
                            newDetailWidth + "px";
                    }
                },
                [document.getElementById("right"), detailPanel],
            );

            makeResizable(
                document.getElementById("handle-detail"),
                function (e) {
                    if (!detailPanel.classList.contains("open")) return;
                    const w = Math.max(

                lightboxCaption,
                lightboxDownload,
                lightboxZoom,
            );
            lightboxInner.append(lightboxImgWrap, lightboxFooter);
            lightbox.appendChild(lightboxInner);
            document.body.appendChild(lightbox);

            // Zoom toggle — pan via mousemove transforms transform-origin
            let lightboxZoomed = false;
            const ZOOM_IN_ICON = `<span class="material-symbols-rounded" style="font-size:18px">zoom_in</span>`;
            const ZOOM_OUT_ICON = `<span class="material-symbols-rounded" style="font-size:18px">zoom_out</span>`;
            lightboxZoom.innerHTML = ZOOM_IN_ICON;

            lightboxZoom.addEventListener("click", (e) => {
                e.stopPropagation();
                lightboxZoomed = !lightboxZoomed;
                lightboxZoom.classList.toggle("active", lightboxZoomed);
                lightboxZoom.title = lightboxZoomed
                    ? "Zoom mode on"
                    : "Zoom in";
                lightboxZoom.innerHTML = lightboxZoomed
                    ? ZOOM_OUT_ICON
                    : ZOOM_IN_ICON;
                if (!lightboxZoomed) {
                    lightboxImgWrap.classList.remove("zoomed");
                    lightboxImg.style.transformOrigin = "center center";
                }
            });

            lightboxImgWrap.addEventListener("mouseenter", () => {
                if (lightboxZoomed) lightboxImgWrap.classList.add("zoomed");
            });
            lightboxImgWrap.addEventListener("mouseleave", () => {
                lightboxImgWrap.classList.remove("zoomed");
                lightboxImg.style.transformOrigin = "center center";
            });
            lightboxImgWrap.addEventListener("mousemove", (e) => {
                if (!lightboxZoomed) return;
                const r = lightboxImgWrap.getBoundingClientRect();
                const x =
                    (((e.clientX - r.left) / r.width) * 100).toFixed(1) + "%";
                const y =
                    (((e.clientY - r.top) / r.height) * 100).toFixed(1) + "%";
                lightboxImg.style.transformOrigin = `${x} ${y}`;
            });

            // Download — opens in new tab for cross-origin images
            lightboxDownload.addEventListener("click", (e) => {
                e.stopPropagation();
                const a = document.createElement("a");
                a.href = lightboxImg.src;
                a.download =
                    lightboxImg.src.split("/").pop().split("?")[0] || "image";
                a.target = "_blank";
                a.rel = "noopener";
                document.body.appendChild(a);
                a.click();
                a.remove();
            });

            const closeLightbox = () => {
                lightbox.classList.remove("open");
                lightboxZoomed = false;
                lightboxImgWrap.classList.remove("zoomed");
                lightboxZoom.classList.remove("active");
                lightboxImg.style.transformOrigin = "center center";
                lightboxZoom.title = "Zoom in";
                lightboxZoom.innerHTML = ZOOM_IN_ICON;
            };

            lightbox.addEventListener("click", (e) => {
                if (e.target === lightbox || e.target === lightboxInner)
                    closeLightbox();
            });

            document
                .getElementById("right-scroll")
                .addEventListener("click", (e) => {
                    const img = e.target.closest("#article-body img");
                    if (!img || !img.src) return;
                    lightboxZoomed = false;
                    lightboxImgWrap.classList.remove("zoomed");
                    lightboxImg.style.transformOrigin = "center center";
                    lightboxImg.src = img.src;
                    const alt = (img.alt || "").trim();
                    lightboxCaption.textContent = alt;
                    lightboxCaption.style.display = alt ? "" : "none";
                    lightbox.classList.add("open");
                });

            // ── Narrow (< 1400px) article overlay ──
            function openNarrowArticle(item) {
                document.getElementById("right").classList.add("narrow-open");
                document.body.classList.add("narrow-article-open");
                const wrap = document.getElementById("narrow-related-wrap");
                wrap.innerHTML = "";
                loadRelatedArticles(item, wrap);
                requestAnimationFrame(() => {
                    document.getElementById("right-scroll").focus();
                    if (_kbNav) setReadingKbIdx(0);
                });
            }

            function closeNarrowArticle() {
                document
                    .getElementById("right")
                    .classList.remove("narrow-open");
                document.body.classList.remove("narrow-article-open");
            }

            document
                .getElementById("narrow-back-btn")
                .addEventListener("click", closeNarrowArticle);

            document
                .getElementById("article-backdrop")
                .addEventListener("click", closeNarrowArticle);

            // ── Keyboard navigation ──

            // Returns article items in their visual (CSS order) sequence
            function gridItemsInOrder(grid) {
                return [...grid.querySelectorAll(".article-item")].sort(
                    (a, b) =>
                        (parseInt(a.style.order) || 0) -
                        (parseInt(b.style.order) || 0),
                );
            }

            // Groups grid items into visual rows by Y position
            function getGridRows(grid) {
                const items = gridItemsInOrder(grid);
                if (!items.length) return [];
                const rows = [];
                let cur = [],
                    rowTop = null;
                for (const el of items) {
                    const top = Math.round(el.getBoundingClientRect().top);
                    if (rowTop === null || Math.abs(top - rowTop) > 20) {
                        if (cur.length) rows.push(cur);
                        cur = [el];
                        rowTop = top;
                    } else {
                        cur.push(el);
                    }
                }
                if (cur.length) rows.push(cur);
                return rows;
            }

            function findInRows(rows, el) {
                for (let r = 0; r < rows.length; r++) {
                    const c = rows[r].indexOf(el);
                    if (c !== -1) return { r, c };
                }
                return null;
            }

            function closestInRow(row, targetX) {
                let best = row[0],
                    bestDist = Infinity;
                for (const el of row) {
                    const rect = el.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const d = Math.abs(cx - targetX);
                    if (d < bestDist) {
                        bestDist = d;
                        best = el;
                    }
                }
                return best;
            }

            function getMasonryCols(grid) {
                return [...grid.querySelectorAll(".masonry-col")]
                    .map(col => [...col.querySelectorAll(".article-item")]);
            }

            function findInMasonry(cols, el) {
                for (let c = 0; c < cols.length; c++) {
                    const r = cols[c].indexOf(el);
                    if (r !== -1) return { c, r };
                }
                return null;
            }

            function closestByY(items, targetY) {
                if (!items.length) return null;
                return items.reduce((best, el) => {
                    const rect = el.getBoundingClientRect();
                    const midY = rect.top + rect.height / 2;
                    const bestRect = best.getBoundingClientRect();
                    const bestY = bestRect.top + bestRect.height / 2;
                    return Math.abs(midY - targetY) < Math.abs(bestY - targetY) ? el : best;
                });
            }

            function focusActiveGridItem() {
                const grid = document.querySelector("#middle .article-grid");
                if (!grid) return;
                const active =
                    grid.querySelector(".article-item.active") ||
                    gridItemsInOrder(grid)[0];
                active?.focus();
                centerGridItem(active);
            }

            function centerGridItem(el, duration = 300) {
                if (!el) return;
                const middle = document.getElementById("middle");
                if (!middle) return;
                const delta = (el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2)
                            - (middle.getBoundingClientRect().top + middle.clientHeight / 2);
                if (Math.abs(delta) < 2) return;
                const start = middle.scrollTop;
                const target = start + delta;
                const startTime = performance.now();
                function ease(t) {
                    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                }
                (function step(now) {
                    const t = Math.min((now - startTime) / duration, 1);
                    middle.scrollTop = start + delta * ease(t);
                    if (t < 1) requestAnimationFrame(step);
                })(performance.now());
            }

            function smoothScrollTop(el, duration = 480) {
                const start = el.scrollTop;
                if (start === 0) return;
                const startTime = performance.now();
                function ease(t) {
                    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                }
                function step(now) {
                    const t = Math.min((now - startTime) / duration, 1);
                    el.scrollTop = start * (1 - ease(t));
                    if (t < 1) requestAnimationFrame(step);
                }
                requestAnimationFrame(step);
            }

            function midToolbarButtons() {
                const tb = document.getElementById("middle-toolbar");
                if (!tb) return [];
                return [...tb.querySelectorAll("button")].filter(
                    (el) => el.offsetParent !== null,
                );
            }

            let _featuredKbActive = false;
            let _lastSidebarFocus = null;
            let _lastMiddleFocus = null;

            function enterFeaturedZone() {
                const sec = document.getElementById("featured-section");
                if (!sec || !sec.querySelector(".featured-card")) return false;
                _featuredKbActive = true;
                sec.classList.add("kb-active");
                sec.tabIndex = -1;
                sec.focus();
                sec.addEventListener(
                    "blur",
                    () => {
                        _featuredKbActive = false;
                        sec.classList.remove("kb-active");
                        startCarouselTimer();
                    },
                    { once: true },
                );
                stopCarouselTimer();
                return true;
            }

            function exitFeaturedZone(toZone) {
                _featuredKbActive = false;
                const sec = document.getElementById("featured-section");
                sec?.classList.remove("kb-active");
                startCarouselTimer();
                if (toZone === "toolbar") {
                    const btns = midToolbarButtons();
                    if (btns.length) {
                        btns[0].focus();
                        smoothScrollTop(document.getElementById("middle"));
                        return;
                    }
                }
                const grid = document.querySelector("#middle .article-grid");
                if (grid) {
                    const items = gridItemsInOrder(grid);
                    items[0]?.focus();
                    centerGridItem(items[0]);
                }
            }

            // Which panel currently holds focus: sidebar | grid | reading | detail
            function focusedPanel() {
                const ae = document.activeElement;
                if (!ae || ae === document.body) return null;
                if (document.getElementById("left").contains(ae))
                    return "sidebar";
                if (document.getElementById("middle").contains(ae))
                    return "grid";
                if (document.getElementById("right").contains(ae))
                    return "reading";
                if (document.getElementById("detail-panel").contains(ae))
                    return "detail";
                return null;
            }

            function returnToSidebar() {
                const target = (_lastSidebarFocus?.offsetParent !== null && _lastSidebarFocus)
                    || document.querySelector("#left-scroll .feed-item.active")
                    || document.getElementById("home-link");
                target?.focus();
                target?.scrollIntoView({ block: "nearest" });
            }

            function returnToMiddle() {
                const saved = _lastMiddleFocus?.offsetParent !== null ? _lastMiddleFocus : null;
                if (saved) {
                    saved.focus();
                    const tb = document.getElementById("middle-toolbar");
                    if (!tb?.contains(saved)) centerGridItem(saved);
                    return;
                }
                const grid = document.querySelector("#middle .article-grid");
                if (grid) {
                    const items = gridItemsInOrder(grid);
                    items[0]?.focus();
                    centerGridItem(items[0]);
                }
            }

            function sidebarFocusItems() {
                return [
                    document.getElementById("sidebar-collapse-btn"),
                    document.getElementById("home-link"),
                    ...document.querySelectorAll("#left-scroll .feed-item"),
                    document.getElementById("add-feed-btn"),
                ].filter((el) => el && el.offsetParent !== null);
            }

            function detailFocusItems() {
                return [
                    ...document.querySelectorAll(
                        "#detail-scroll .linked-item, #detail-scroll .related-item",
                    ),
                ].filter((el) => el.offsetParent !== null);
            }

            function readingFocusItems() {
                const body = document.getElementById("article-body");
                if (!body) return [];
                const header = [
                    document.getElementById("article-source"),
                    document.getElementById("article-title"),
                    document.getElementById("article-link"),
                ].filter((el) => el && el.offsetHeight > 0);
                const bodyItems = [
                    ...body.querySelectorAll(
                        "p, h1, h2, h3, h4, h5, h6, img, figure, blockquote, pre, ul, ol, table",
                    ),
                ].filter((el) => {
                    if (!el.offsetHeight) return false;
                    if (["IMG", "FIGURE", "PRE", "TABLE", "UL", "OL"].includes(el.tagName)) return true;
                    return el.textContent.trim().length > 0;
                });
                const narrowLinked = [
                    ...document.querySelectorAll(
                        "#narrow-related-wrap .linked-item",
                    ),
                ].filter((el) => el.offsetParent !== null);
                const narrowRelated = [
                    ...document.querySelectorAll(
                        "#narrow-related-wrap .related-item",
                    ),
                ].filter((el) => el.offsetParent !== null);
                return [
                    ...header,
                    ...bodyItems,
                    ...narrowLinked,
                    ...narrowRelated,
                ];
            }

            function isArticleOpen() {
                const rc = document.getElementById("reading-controls");
                return rc && rc.style.display !== "none";
            }

            let _kbNav = false;
            document.addEventListener("pointerdown", () => { _kbNav = false; }, true);
            document.addEventListener("keydown", () => { _kbNav = true; }, true);

            let readingKbIdx = -1;

            function setReadingKbIdx(idx) {
                const items = readingFocusItems();
                items.forEach((el) => el.classList.remove("kb-focus"));
                readingKbIdx = idx;
                if (idx >= 0 && idx < items.length) {
                    items[idx].classList.add("kb-focus");
                    const block =
                        idx === 0
                            ? "start"
                            : idx === items.length - 1
                              ? "end"
                              : "center";
                    items[idx].scrollIntoView({ block, behavior: "smooth" });
                }
            }

            function clearReadingKb() {
                readingFocusItems().forEach((el) =>
                    el.classList.remove("kb-focus"),
                );
                readingKbIdx = -1;
            }

            // Make right-scroll programmatically focusable for panel detection
            document.getElementById("right-scroll").tabIndex = -1;

            document.addEventListener("keydown", (e) => {
                const tag = document.activeElement?.tagName;
                if (
                    tag === "INPUT" ||
                    tag === "TEXTAREA" ||
                    document.activeElement?.isContentEditable
                )
                    return;

                // ── Escape: close overlays ──
                if (e.key === "Escape") {
                    if (
                        document
                            .getElementById("img-lightbox")
                            ?.classList.contains("open")
                    ) {
                        closeLightbox();
                        return;
                    }
                    if (
                        document
                            .getElementById("left")
                            ?.classList.contains("drawer-open")
                    ) {
                        closeDrawer();
                        return;
                    }
                    if (
                        document.body.classList.contains("narrow-article-open")
                    ) {
                        e.preventDefault();
                        clearReadingKb();
                        closeNarrowArticle();
                        focusActiveGridItem();
                        return;
                    }
                    if (
                        document
                            .getElementById("rc-panel")
                            ?.classList.contains("open")
                    ) {
                        document
                            .getElementById("rc-panel")
                            .classList.remove("open");
                        document
                            .getElementById("rc-toggle")
                            ?.classList.remove("open");
                        return;
                    }
                    if (
                        document
                            .getElementById("feed-error-log")
                            ?.classList.contains("open")
                    ) {
                        document
                            .getElementById("feed-error-log")
                            .classList.remove("open");
                        return;
                    }
                    return;
                }

                // ── Backspace: navigate back ──
                if (e.key === "Backspace") {
                    if (
                        document
                            .getElementById("img-lightbox")
                            ?.classList.contains("open")
                    ) {
                        e.preventDefault();
                        closeLightbox();
                        return;
                    }
                    if (
                        document.body.classList.contains("narrow-article-open")
                    ) {
                        e.preventDefault();
                        clearReadingKb();
                        closeNarrowArticle();
                        focusActiveGridItem();
                        return;
                    }
                    const bp = focusedPanel();
                    if (bp === "detail") {
                        e.preventDefault();
                        if (isArticleOpen()) {
                            document.getElementById("right-scroll").focus();
                            setReadingKbIdx(0);
                        } else {
                            const grid = document.querySelector(
                                "#middle .article-grid",
                            );
                            if (grid) gridItemsInOrder(grid)[0]?.focus();
                        }
                        return;
                    }
                    if (bp === "reading") {
                        e.preventDefault();
                        clearReadingKb();
                        const grid = document.querySelector(
                            "#middle .article-grid",
                        );
                        if (grid) gridItemsInOrder(grid)[0]?.focus();
                        return;
                    }
                    if (
                        !document
                            .getElementById("home-link")
                            ?.classList.contains("active")
                    ) {
                        e.preventDefault();
                        document.getElementById("home-link")?.click();
                        return;
                    }
                    return;
                }

                const panel = focusedPanel();

                // ── Enter/Space: activate focused item ──
                if (e.key === "Enter" || e.key === " ") {
                    if (tag === "BUTTON" || tag === "A") return;
                    if (_featuredKbActive) {
                        e.preventDefault();
                        document
                            .querySelector(".featured-card.focused")
                            ?.click();
                        return;
                    }
                    if (panel === "sidebar") {
                        const ae = document.activeElement;
                        if (
                            ae?.classList.contains("feed-item") ||
                            ae?.id === "home-link"
                        ) {
                            e.preventDefault();
                            ae.click();
                        }
                    } else if (panel === "reading") {
                        const items = readingFocusItems();
                        const focused = items[readingKbIdx];
                        if (
                            focused?.classList.contains("related-item") ||
                            focused?.classList.contains("linked-item")
                        ) {
                            e.preventDefault();
                            focused.click();
                        }
                    } else if (panel === "grid") {
                        const ae = document.activeElement;
                        if (ae?.classList.contains("article-item")) {
                            e.preventDefault();
                            ae.click();
                        }
                    }
                    return;
                }

                if (
                    ![
                        "ArrowUp",
                        "ArrowDown",
                        "ArrowLeft",
                        "ArrowRight",
                    ].includes(e.key)
                )
                    return;
                if (!panel) return;

                // ── ArrowRight ──
                if (e.key === "ArrowRight") {
                    if (panel === "sidebar") {
                        e.preventDefault();
                        _lastSidebarFocus = document.activeElement;
                        returnToMiddle();
                        return;
                    } else if (panel === "reading") {
                        const dp = document.getElementById("detail-panel");
                        if (!dp?.classList.contains("open")) return;
                        e.preventDefault();
                        clearReadingKb();
                        const dItems = detailFocusItems();
                        if (dItems.length > 0) {
                            dItems[0].focus();
                            dItems[0].scrollIntoView({ block: "nearest" });
                        }
                    } else if (panel === "grid") {
                        if (_featuredKbActive) {
                            e.preventDefault();
                            featuredIndex =
                                (featuredIndex + 1) % featuredArticles.length;
                            positionCarousel();
                            return;
                        }
                        const ae = document.activeElement;
                        const tb = document.getElementById("middle-toolbar");
                        if (tb?.contains(ae)) {
                            e.preventDefault();
                            const btns = midToolbarButtons();
                            const idx = btns.indexOf(ae);
                            if (idx < btns.length - 1) {
                                btns[idx + 1].focus();
                            } else if (isArticleOpen()) {
                                if (window.innerWidth < 1400) {
                                    document
                                        .getElementById("right")
                                        .classList.add("narrow-open");
                                    document.body.classList.add(
                                        "narrow-article-open",
                                    );
                                }
                                document.getElementById("right-scroll").focus();
                                setReadingKbIdx(0);
                            }
                            return;
                        }
                        // Article grid: move right within row
                        const grid = document.querySelector(
                            "#middle .article-grid",
                        );
                        if (!grid) return;
                        e.preventDefault();
                        if (grid.classList.contains("masonry-view")) {
                            const cols = getMasonryCols(grid);
                            const pos = findInMasonry(cols, ae);
                            if (!pos) { cols[0]?.[0]?.focus(); return; }
                            if (pos.c < cols.length - 1) {
                                const targetY = ae.getBoundingClientRect().top + ae.getBoundingClientRect().height / 2;
                                const target = closestByY(cols[pos.c + 1], targetY);
                                if (target) { target.focus(); centerGridItem(target); }
                            } else if (isArticleOpen() && window.innerWidth >= 1400) {
                                document.getElementById("right-scroll").focus();
                                setReadingKbIdx(0);
                            }
                            return;
                        }
                        const rows = getGridRows(grid);
                        const pos = findInRows(rows, ae);
                        if (!pos) {
                            gridItemsInOrder(grid)[0]?.focus();
                            return;
                        }
                        const row = rows[pos.r];
                        if (pos.c < row.length - 1) {
                            row[pos.c + 1].focus();
                            centerGridItem(row[pos.c + 1]);
                        } else if (isArticleOpen() && window.innerWidth >= 1400) {
                            document.getElementById("right-scroll").focus();
                            setReadingKbIdx(0);
                        }
                    }
                    return;
                }

                // ── ArrowLeft ──
                if (e.key === "ArrowLeft") {
                    if (panel === "detail") {
                        e.preventDefault();
                        if (isArticleOpen()) {
                            document.getElementById("right-scroll").focus();
                            const items = readingFocusItems();
                            setReadingKbIdx(
                                Math.min(
                                    readingKbIdx >= 0 ? readingKbIdx : 0,
                                    items.length - 1,
                                ),
                            );
                        } else {
                            const grid = document.querySelector(
                                "#middle .article-grid",
                            );
                            if (grid) gridItemsInOrder(grid)[0]?.focus();
                        }
                    } else if (panel === "reading") {
                        e.preventDefault();
                        clearReadingKb();
                        focusActiveGridItem();
                    } else if (panel === "grid") {
                        if (_featuredKbActive) {
                            e.preventDefault();
                            featuredIndex =
                                (featuredIndex - 1 + featuredArticles.length) %
                                featuredArticles.length;
                            positionCarousel();
                            return;
                        }
                        const ae = document.activeElement;
                        const tb = document.getElementById("middle-toolbar");
                        if (tb?.contains(ae)) {
                            e.preventDefault();
                            const btns = midToolbarButtons();
                            const idx = btns.indexOf(ae);
                            if (idx > 0) {
                                btns[idx - 1].focus();
                            } else {
                                _lastMiddleFocus = ae;
                                returnToSidebar();
                            }
                            return;
                        }
                        // Article grid: move left within row, or jump to sidebar at left edge
                        const grid = document.querySelector(
                            "#middle .article-grid",
                        );
                        if (!grid) return;
                        e.preventDefault();
                        if (grid.classList.contains("masonry-view")) {
                            const cols = getMasonryCols(grid);
                            const pos = findInMasonry(cols, ae);
                            if (!pos) { cols[0]?.[0]?.focus(); return; }
                            if (pos.c > 0) {
                                const targetY = ae.getBoundingClientRect().top + ae.getBoundingClientRect().height / 2;
                                const target = closestByY(cols[pos.c - 1], targetY);
                                if (target) { target.focus(); centerGridItem(target); }
                            } else {
                                _lastMiddleFocus = ae;
                                returnToSidebar();
                            }
                            return;
                        }
                        const rows = getGridRows(grid);
                        const pos = findInRows(rows, ae);
                        if (!pos) {
                            gridItemsInOrder(grid)[0]?.focus();
                            return;
                        }
                        if (pos.c > 0) {
                            rows[pos.r][pos.c - 1].focus();
                            centerGridItem(rows[pos.r][pos.c - 1]);
                        } else {
                            _lastMiddleFocus = ae;
                            returnToSidebar();
                        }
                    }
                    return;
                }

                // ── ArrowUp/Down: within-panel navigation ──
                const isDown = e.key === "ArrowDown";

                if (panel === "sidebar") {
                    const items = sidebarFocusItems();
                    const idx = items.indexOf(document.activeElement);
                    if (idx === -1) return;
                    e.preventDefault();
                    const next =
                        items[
                            isDown
                                ? Math.min(idx + 1, items.length - 1)
                                : Math.max(idx - 1, 0)
                        ];
                    next?.focus();
                    next?.scrollIntoView({ block: "nearest" });
                } else if (panel === "grid") {
                    // Featured zone: only Down exits (Up is already at top)
                    if (_featuredKbActive) {
                        if (isDown) {
                            e.preventDefault();
                            exitFeaturedZone("toolbar");
                        }
                        return;
                    }
                    const ae = document.activeElement;
                    const tb = document.getElementById("middle-toolbar");
                    if (tb?.contains(ae)) {
                        e.preventDefault();
                        if (!isDown) {
                            // Up from toolbar → featured carousel
                            enterFeaturedZone();
                        } else {
                            // Down from toolbar → first article
                            const grid = document.querySelector(
                                "#middle .article-grid",
                            );
                            if (grid) {
                                const items = gridItemsInOrder(grid);
                                items[0]?.focus();
                                centerGridItem(items[0]);
                            }
                        }
                        return;
                    }
                    // Article grid: 2D row/column navigation
                    const grid = document.querySelector(
                        "#middle .article-grid",
                    );
                    if (!grid) return;
                    e.preventDefault();
                    if (grid.classList.contains("masonry-view")) {
                        const cols = getMasonryCols(grid);
                        const pos = findInMasonry(cols, ae);
                        if (!pos) { cols[0]?.[0]?.focus(); return; }
                        const col = cols[pos.c];
                        if (!isDown) {
                            if (pos.r > 0) {
                                col[pos.r - 1].focus();
                                centerGridItem(col[pos.r - 1]);
                            } else {
                                const btns = midToolbarButtons();
                                if (btns.length) {
                                    btns[0].focus();
                                    smoothScrollTop(document.getElementById("middle"));
                                }
                            }
                        } else {
                            if (pos.r < col.length - 1) {
                                col[pos.r + 1].focus();
                                centerGridItem(col[pos.r + 1]);
                            }
                        }
                        return;
                    }
                    const rows = getGridRows(grid);
                    const pos = findInRows(rows, ae);
                    if (!pos) {
                        gridItemsInOrder(grid)[0]?.focus();
                        return;
                    }
                    const curCenterX =
                        ae.getBoundingClientRect().left +
                        ae.getBoundingClientRect().width / 2;
                    if (!isDown) {
                        if (pos.r > 0) {
                            const target = closestInRow(
                                rows[pos.r - 1],
                                curCenterX,
                            );
                            target.focus();
                            centerGridItem(target);
                        } else {
                            // First row → toolbar; scroll middle panel to top
                            const btns = midToolbarButtons();
                            if (btns.length) {
                                btns[0].focus();
                                smoothScrollTop(document.getElementById("middle"));
                            }
                        }
                    } else {
                        if (pos.r < rows.length - 1) {
                            const target = closestInRow(
                                rows[pos.r + 1],
                                curCenterX,
                            );
                            target.focus();
                            centerGridItem(target);
                        }
                        // Last row: stay (don't jump panels on Down)
                    }
                } else if (panel === "reading") {
                    const items = readingFocusItems();
                    if (!items.length) return;
                    e.preventDefault();
                    const next = isDown
                        ? Math.min(
                              (readingKbIdx < 0 ? -1 : readingKbIdx) + 1,
                              items.length - 1,
                          )
                        : Math.max(
                              (readingKbIdx < 0 ? items.length : readingKbIdx) -
                                  1,
                              0,
                          );
                    setReadingKbIdx(next);
                } else if (panel === "detail") {
                    const items = detailFocusItems();
                    if (!items.length) return;
                    const idx = items.indexOf(document.activeElement);
                    e.preventDefault();
                    if (idx === -1) {
                        items[0].focus();
                        return;
                    }
                    const next =
                        items[
                            isDown
                                ? Math.min(idx + 1, items.length - 1)
                                : Math.max(idx - 1, 0)
                        ];
                    next?.focus();
                    next?.scrollIntoView({ block: "nearest" });
                }
            });

            // ── Freeze GIF animations outside the article panel ──
            (function setupGifFreeze() {
                function isGif(src) {
                    return src && /\.gif$/i.test(src.split("?")[0]);
                }
                function freeze(img) {
                    if (!isGif(img.src)) return;
                    if (img.closest("#article-body")) return;
                    if (img.dataset.gifFrozen) return;
                    img.dataset.gifFrozen = "1";
                    const attempt = () => {
                        if (!img.naturalWidth || !img.naturalHeight) return;
                        try {
                            const c = document.createElement("canvas");
                            c.width = img.naturalWidth;
                            c.height = img.naturalHeight;
                            c.getContext("2d").drawImage(img, 0, 0);
                            img.dataset.gifSrc = img.src;
                            img.src = c.toDataURL("image/png");
                        } catch (_) {
                            /* cross-origin — can't freeze */
                        }
                    };
                    if (img.complete) attempt();
                    else img.addEventListener("load", attempt, { once: true });
                }
                new MutationObserver((mutations) => {
                    for (const m of mutations) {
                        for (const node of m.addedNodes) {
                            if (node.nodeType !== 1) continue;
                            if (node.tagName === "IMG") freeze(node);
                            else node.querySelectorAll("img").forEach(freeze);
                        }
                    }
                }).observe(document.body, { childList: true, subtree: true });
            })();

            // ── Init ──
            document.getElementById("home-link").classList.add("active");
            if (GReader.isConnected()) {
                // Pull subscriptions from the server before rendering home so feeds +
                // folders come from FreshRSS; fall back to rendering on error.
                grSyncSubscriptions()
                    .catch((e) =>
                        console.warn("GReader subscription sync failed", e),
                    )
                    .finally(loadHomepage);
            } else {
                loadHomepage();
            }
        </script>
    </body>
</html>
