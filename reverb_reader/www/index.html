                    for (const catEl of catEls) {
                        const label = catEl.textContent.replace("▾", "").trim();
                        if (label === category) {
                            targetGroup = catEl.nextElementSibling;
                            break;
                        }
                    }
                    if (!targetGroup) {
                        const catEl = document.createElement("div");
                        catEl.className = "category";
                        catEl.innerHTML = `<span class="cat-arrow">▾</span>${escapeHtml(category)}`;
                        const groupEl = document.createElement("div");
                        groupEl.className = "feed-group";
                        const addBtn = document.getElementById("add-feed-btn");
                        leftEl.insertBefore(catEl, addBtn);
                        leftEl.insertBefore(groupEl, addBtn);
                        catEl.addEventListener("click", () => {
                            const collapsed =
                                groupEl.classList.toggle("collapsed");
                            catEl.querySelector(".cat-arrow").style.transform =
                                collapsed ? "rotate(-90deg)" : "";
                        });
                        targetGroup = groupEl;
                    }
                    addFeedItemToLeft(feed, targetGroup);

                    document
                        .getElementById("add-feed-modal")
                        .classList.remove("open");
                });

            // ── Backdrop ──
            let backdropCurrentUrl = null;

            function setBackdropImage(url, tintRgb) {
                let bg = document.getElementById("featured-bg");
                if (!bg) {
                    bg = document.createElement("div");
                    bg.id = "featured-bg";
                    document.body.prepend(bg);
                }
                if (!url) return;
                const tintVal = tintRgb ? `rgba(${tintRgb}, 0.6)` : "";
                if (url === backdropCurrentUrl) {
                    bg.style.backgroundColor = tintVal;
                    bg.style.backgroundBlendMode = tintRgb ? "multiply" : "";
                    return;
                }
                backdropCurrentUrl = url;
                bg.style.opacity = "0";
                setTimeout(() => {
                    bg.style.backgroundImage = `url(${url})`;
                    bg.style.backgroundColor = tintVal;
                    bg.style.backgroundBlendMode = tintRgb ? "multiply" : "";
                    bg.style.opacity = "1";
                }, 175);
            }

            // Shared blurred backdrop tied to the OPEN article. Spans both the
            // feed grid and the reader pane (separate from the carousel/feed
            // backdrop #featured-bg). url = the article's hero image; tintRgb =
            // the source color ("r, g, b") applied as a multiply tint.
            let articleBackdropUrl = null;
            let articleBackdropTint = null; // current desired source tint "r,g,b"
            // Apply the live tint (read from articleBackdropTint, not a stale
            // captured value) to #article-bg. multiply only when an image is
            // present, so a tint-only wash shows as a flat source color.
            function applyArticleTint(bg) {
                bg.style.backgroundColor = articleBackdropTint
                    ? `rgba(${articleBackdropTint}, 0.55)`
                    : "";
                bg.style.backgroundBlendMode =
                    articleBackdropTint && articleBackdropUrl ? "multiply" : "";
            }
            function setArticleBackdrop(url, tintRgb) {
                const bg = document.getElementById("article-bg");
                if (!bg) return;
                document.body.classList.add("article-open");
                articleBackdropTint = tintRgb || null;
                if (!url) {
                    // No hero image: show a source-color wash only.
                    articleBackdropUrl = null;
                    bg.style.backgroundImage = "";
                    applyArticleTint(bg);
                    bg.style.opacity = "1";
                    return;
                }
                if (url === articleBackdropUrl) {
                    applyArticleTint(bg);
                    bg.style.opacity = "1";
                    return;
                }
                articleBackdropUrl = url;
                bg.style.opacity = "0";
                setTimeout(() => {
                    if (articleBackdropUrl !== url) return;
                    bg.style.backgroundImage = `url(${url})`;
                    applyArticleTint(bg); // read live tint, avoid clobber race
                    bg.style.opacity = "1";
                }, 175);
            }
            // Update only the source-color tint of an already-shown backdrop.
            function tintArticleBackdrop(tintRgb) {
                const bg = document.getElementById("article-bg");
                if (!bg || !document.body.classList.contains("article-open"))
                    return;
                articleBackdropTint = tintRgb || null;
                applyArticleTint(bg);
            }
            function clearArticleBackdrop() {
                const bg = document.getElementById("article-bg");
                document.body.classList.remove("article-open");
                articleBackdropUrl = null;
                articleBackdropTint = null;
                if (!bg) return;
                bg.style.opacity = "0";
                bg.style.backgroundImage = "";
                bg.style.backgroundColor = "";
                bg.style.backgroundBlendMode = "";
            }

            function mountRefreshButton(onClick) {
                const btn = document.getElementById("refresh-btn");
                if (!btn) return;
                btn.addEventListener("click", () => {
                    btn.classList.add("spinning");
                    Promise.resolve(onClick()).finally(() =>
                        btn.classList.remove("spinning"),
                    );
                });
            }

            // ── Article panel reset ──
            function resetArticlePanel() {
                document.getElementById("reading-controls").style.display =
                    "none";
                document.getElementById("article-view-toggle").style.display =
                    "none";
                document
                    .getElementById("right")
                    .style.removeProperty("--panel-complement-glow");
                document
                    .getElementById("right")
                    .style.removeProperty("--panel-complement-glow-dim");
                document
                    .getElementById("right")
                    .style.removeProperty("--article-source-rgb");
                document.getElementById("article-pane").innerHTML =
                    '<div class="placeholder">Select an article</div>';
                clearArticleBackdrop();
                document.getElementById("narrow-related-wrap").innerHTML = "";
                document
                    .querySelectorAll(".kb-focus")
                    .forEach((el) => el.classList.remove("kb-focus"));
                closeNarrowArticle();
            }

            // ── Homepage ──
            function loadHomepage() {
                currentFeedKey = "home";
                // Returning to the carousel home: drop the open-article backdrop
                // so the carousel's own blurred #featured-bg shows through again.
                clearArticleBackdrop();
                document.body.style.setProperty("--article-accent", "#ffffff");
                viewMode = localStorage.getItem("view-mode:home") || "grid";
                const middle = document.getElementById("middle");

                // Render shell immediately, sources right away, featured async
                _lazyTeardown();
                middle.innerHTML = `
                    <div id="featured-section"></div>
                    <div class="section-title" id="all-feeds-title">All Feeds</div>
                    <div id="middle-toolbar">
                        <button id="refresh-btn"><span class="refresh-icon material-symbols-rounded">refresh</span> Refresh</button>

                        <input id="card-size" type="range" min="0" max="3" value="0" step="1">
                        <button id="view-toggle" title="Switch to list view"><span class="material-symbols-rounded">grid_view</span></button>
                        <button id="theme-toggle" title="Toggle dark mode"><span class="material-symbols-rounded">dark_mode</span></button>
                    </div>
                    <div id="all-feeds-grid" class="article-grid"></div>
                `;
                mountRefreshButton(() => {
                    _lazyTeardown();
                    const grid = document.getElementById("all-feeds-grid");
                    if (grid) grid.innerHTML = "";
                    resetFeatured();
                    loadAllFeeds();
                });
                mountCardSlider();
                mountViewToggle();
                mountThemeToggle();
                resetFeatured();
                loadAllFeeds();
            }

            // ── Shared article element builder ──
            function makeArticleEl(item, feed, showSource, animate = true) {
                const title = getText(item, "title");
                const date = getText(item, "pubDate", "published", "updated");
                const desc = getText(item, "description", "summary");
                const excerpt = stripHtml(desc).slice(0, 82);
                const image = getImage(item);
                const link = getLink(item);
                const ts = new Date(date).getTime() || 0;
                const domain = feed.url ? feedDomain(feed) : null;
                let rgb = domain ? domainColorCache[domain] : null;
                const el = document.createElement("div");
                el.className = animate
                    ? "article-item"
                    : "article-item no-anim";
                el.tabIndex = 0;
                el.dataset.ts = ts;
                el.dataset.feedUrl = feed.url || "";
                el.dataset.link = link || "";
                if (rgb) {
                    el.style.setProperty(
                        "--card-thumb-color",
                        `rgba(${rgb}, 0.5)`,
                    );
                    el.style.setProperty("--item-accent", `rgb(${rgb})`);
                }
                el.innerHTML = `
                    ${
                        image
                            ? `<img class="article-thumb" src="${image}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'article-thumb-placeholder'}))">`
                            : `<div class="article-thumb-placeholder"></div>`
                    }
                    <div class="article-info">
                        ${showSource ? `<div class="article-source"${rgb ? ` style="color:rgb(${rgb})"` : ""}>${escapeHtml(feed.title)}</div>` : ""}
                        <div class="article-title">${escapeHtml(title)}</div>
                        <div class="article-date">${formatDate(date)}</div>
                        <div class="article-excerpt">${escapeHtml(excerpt)}${excerpt.length >= 82 ? "…" : ""}</div>
                    </div>
                `;
                // If color wasn't cached yet, fetch it and apply to card label + placeholder
                if (domain && !rgb) {
                    resolveColor(domain).then((resolved) => {
                        if (!resolved) return;
                        rgb = resolved;
                        el.style.setProperty(
                            "--card-thumb-color",
                            `rgba(${resolved}, 0.5)`,
                        );
                        el.style.setProperty(
                            "--item-accent",
                            `rgb(${resolved})`,
                        );
                        if (showSource) {
                            const src = el.querySelector(".article-source");
                            if (src) src.style.color = `rgb(${resolved})`;
                        }
                    });
                }
                el.addEventListener("click", () => {
                    showArticle(
                        item,
                        el,
                        link,
                        feed.title || getItemSource(item),
                        rgb,
                        domain,
                    );
                });
                return el;
            }

            function getItemSource(item) {
                return (
                    item.querySelector("source")?.textContent?.trim() ||
                    item
                        .getElementsByTagName("dc:source")[0]
                        ?.textContent?.trim() ||
                    ""
                );
            }

            function removeLoadingIndicator() {
                document.querySelector(".feed-loading")?.remove();
            }

            function sortAllFeedsGrid(grid) {
                if (viewMode === "masonry") {
                    // Flush any queued items into DOM before masonry layout
                    if (_lazyQueue.length) {
                        const frag = document.createDocumentFragment();
                        _lazyQueue.forEach((el) => frag.appendChild(el));
                        _lazyTeardown();
                        grid.appendChild(frag);
                    }
                    requestAnimationFrame(() => buildMasonry(grid));
                    return;
                }
                // Collect items from DOM + lazy queue, sort, then re-lazy-load
                const domItems = [...grid.querySelectorAll(".article-item")];
                const allItems = [...domItems, ..._lazyQueue];
                allItems.sort(
                    (a, b) =>
                        parseInt(b.dataset.ts || 0) -
                        parseInt(a.dataset.ts || 0),
                );
                allItems.forEach((item) => { item.style.order = ""; });
                domItems.forEach((el) => el.remove());
                _lazyInit(grid, allItems);
            }

            // ── Lazy loading ──────────────────────────────────────────────
            const LAZY_BATCH = 40;
            let _lazyQueue = [];
            let _lazySentinel = null;
            let _lazyObserver = null;

            function _lazyFlush(grid) {
                if (!_lazyQueue.length) return;
                const batch = _lazyQueue.splice(0, LAZY_BATCH);
                const frag = document.createDocumentFragment();
                batch.forEach((el) => frag.appendChild(el));
                if (_lazySentinel && _lazySentinel.parentNode === grid) {
                    grid.insertBefore(frag, _lazySentinel);
                } else {
                    grid.appendChild(frag);
                }
                if (!_lazyQueue.length) _lazyTeardown();
            }

            function _lazyTeardown() {
                if (_lazyObserver) { _lazyObserver.disconnect(); _lazyObserver = null; }
                if (_lazySentinel) { _lazySentinel.remove(); _lazySentinel = null; }
                _lazyQueue = [];
            }

            function _lazyInit(grid, items) {
                _lazyTeardown();
                if (items.length <= LAZY_BATCH) {
                    const frag = document.createDocumentFragment();
                    items.forEach((el) => frag.appendChild(el));
                    grid.appendChild(frag);
                    return;
                }
                _lazyQueue = items.slice();
                _lazySentinel = document.createElement("div");
                _lazySentinel.className = "lazy-sentinel";
                grid.appendChild(_lazySentinel);
                _lazyObserver = new IntersectionObserver(
                    (entries) => { if (entries[0].isIntersecting) _lazyFlush(grid); },
                    { rootMargin: "300px" }
                );
                _lazyObserver.observe(_lazySentinel);
                _lazyFlush(grid);
            }
            // ─────────────────────────────────────────────────────────────

            let _sortDebounceTimer = null;
            function sortAllFeedsGridDebounced(grid) {
                if (_sortDebounceTimer) clearTimeout(_sortDebounceTimer);
                _sortDebounceTimer = setTimeout(() => {
                    _sortDebounceTimer = null;
                    sortAllFeedsGrid(grid);
                }, 300);
            }

            function renderFeedItemsToGrid(feed, xml, animate = true) {
                removeLoadingIndicator();
                const grid = document.getElementById("all-feeds-grid");
                if (!grid) return;
                const doc = new DOMParser().parseFromString(xml, "text/xml");
                const frag = document.createDocumentFragment();
                [...doc.querySelectorAll("item, entry")].forEach((item, i) => {
                    const el = makeArticleEl(item, feed, true, animate);
                    if (animate) el.style.animationDelay = `${Math.min(i * 35, 350)}ms`;
                    frag.appendChild(el);
                });
                grid.appendChild(frag);
            }

            function loadAllFeedsIndividual(myId) {
                const allFeeds = FEEDS.flatMap((cat) => cat.items);

                // Render cached articles immediately (stale), then sort once all cached feeds are appended
                allFeeds.forEach((feed) => {
                    if (
                        loadAllFeedsId !== myId ||
                        !document.getElementById("all-feeds-grid")
                    )
                        return;
                    const cachedXml = getFeedPageCache(feed.url);
                    if (cachedXml) {
                        renderFeedItemsToGrid(feed, cachedXml, false);
                        offerToFeatured(feed, cachedXml);
                    }
                });
                removeLoadingIndicator();
                const gridAfterCache =
                    document.getElementById("all-feeds-grid");
                if (gridAfterCache) sortAllFeedsGrid(gridAfterCache);

                // Fetch fresh in parallel; only re-render a feed if its articles changed
                allFeeds.forEach(async (feed) => {
                    if (isFeedCoolingDown(feed.url)) return;
                    try {
                        const xml = await fetchFeed(feed.url);
                        if (
                            loadAllFeedsId !== myId ||
                            !document.getElementById("all-feeds-grid")
                        )
                            return;
                        const grid = document.getElementById("all-feeds-grid");
                        if (!grid) return;

                        const doc = new DOMParser().parseFromString(
                            xml,
                            "text/xml",
                        );
                        const freshLinks = new Set(
                            [...doc.querySelectorAll("item, entry")]
                                .map((i) => getLink(i))
                                .filter(Boolean),
                        );
                        const existingEls = [
                            ...grid.querySelectorAll(
                                `.article-item[data-feed-url="${CSS.escape(feed.url)}"]`,
                            ),
                        ];
                        const existingLinks = new Set(
                            existingEls
                                .map((el) => el.dataset.link)
                                .filter(Boolean),
                        );
                        const unchanged =
                            existingLinks.size > 0 &&
                            freshLinks.size === existingLinks.size &&
                            [...freshLinks].every((l) => existingLinks.has(l));

                        setFeedPageCache(feed.url, xml);
                        offerToFeatured(feed, xml);
                        if (unchanged) return;

                        existingEls.forEach((el) => el.remove());
                        renderFeedItemsToGrid(feed, xml, false);
                        sortAllFeedsGridDebounced(grid);
                    } catch (e) {
                        logFeedError(feed.title, feed.url, e);
                    }
                });
            }

            let loadAllFeedsId = 0;

            function loadAllFeeds() {
                const grid = document.getElementById("all-feeds-grid");
                if (!grid) return;
                const myId = ++loadAllFeedsId;

                const loadingEl = document.createElement("div");
                loadingEl.className = "feed-loading";
                loadingEl.innerHTML =
                    '<div class="feed-loading-spinner"></div>Loading feeds…';
                grid.appendChild(loadingEl);

                loadAllFeedsIndividual(myId);
                if (viewMode === "masonry") {
                    const g = document.getElementById("all-feeds-grid");
                    if (g) requestAnimationFrame(() => buildMasonry(g));
                }
            }

            let featuredIndex = 0;
            let featuredArticles = [];
            const FEATURED_WINDOW_MS = 72 * 60 * 60 * 1000;
            // Pool: feed url → array of scored candidates from the last 24h
            const _featuredPool = new Map();

            function _scoreFeaturedItem(item, position) {
                let score = 0;
                // Image is the strongest signal — cards look much better with one
                if (getImage(item)) score += 5;
                // Content richness as a proxy for article depth
                const desc = stripHtml(
                    getText(
                        item,
                        "description",
                        "summary",
                        "content:encoded",
                        "content",
                    ),
                );
                if (desc.length > 400) score += 3;
                else if (desc.length > 150) score += 2;
                else if (desc.length > 50) score += 1;
                // Title length sweet spot
                const title = getText(item, "title");
                if (title.length >= 30 && title.length <= 120) score += 1;
                // Earlier in the feed = more recently/prominently published
                score += Math.max(0, 3 - position);
                return score;
            }

            function _rebuildFeatured() {
                if (!document.getElementById("featured-section")) return;
                const now = Date.now();
                const cutoff = now - FEATURED_WINDOW_MS;

                // Flatten all per-feed candidates, filter to 24h window,
                // sort by score desc, pick top 5 with at most one per source
                const seenSources = new Set();
                const top8 = [..._featuredPool.values()]
                    .flat()
                    .filter((c) => c.ts >= cutoff && getImage(c.item))
                    .sort((a, b) => b.score - a.score)
                    .filter((c) => {
                        if (seenSources.has(c.feed.url)) return false;
                        seenSources.add(c.feed.url);
                        return true;
                    })
                    .slice(0, 8);

                const changed =
                    top8.length !== featuredArticles.length ||
                    top8.some(
                        (c, i) =>
                            !featuredArticles[i] ||
                            c.feed.url !== featuredArticles[i].feed.url,
                    );
                if (!changed) return;

                featuredArticles = top8.map(({ feed, item }) => ({
                    feed,
                    item,
                }));
                featuredIndex = Math.min(
                    featuredIndex,
                    Math.max(0, featuredArticles.length - 1),
                );
                buildCarousel();
            }

            function offerToFeatured(feed, xml) {
                if (!document.getElementById("featured-section")) return;
                const doc = new DOMParser().parseFromString(xml, "text/xml");
                const now = Date.now();
                const cutoff = now - FEATURED_WINDOW_MS;

                // Score the top few items from this feed and store the pool
                const candidates = [...doc.querySelectorAll("item, entry")]
                    .slice(0, 8)
                    .map((item, position) => {
                        const dateStr = getText(
                            item,
                            "pubDate",
                            "published",
                            "updated",
                        );
                        const ts = dateStr
                            ? new Date(dateStr).getTime() || 0
                            : 0;
                        if (ts < cutoff && ts !== 0) return null;
                        return {
                            feed,
                            item,
                            ts,
                            score: _scoreFeaturedItem(item, position),
                        };
                    })
                    .filter(Boolean);

                if (!candidates.length) return;
                _featuredPool.set(feed.url, candidates);
                _rebuildFeatured();
            }

            let _featuredAutoSelected = false;

            function resetFeatured() {
                stopCarouselTimer();
                _featuredPool.clear();
                featuredArticles = [];
                featuredIndex = 0;
                _featuredAutoSelected = false;
                const section = document.getElementById("featured-section");
                if (section) section.innerHTML = "";
            }

            function makeFeaturedCard(feed, item) {
                const title = getText(item, "title");
                const date = getText(item, "pubDate", "published", "updated");
                const desc = getText(item, "description", "summary");
                const excerpt = stripHtml(desc).slice(0, 140);
                const image = getImage(item);
                const link = getLink(item);

                const card = document.createElement("div");
                card.className = "featured-card";
                card.innerHTML = `
                    <div class="thumb-frame">
                        ${
                            image
                                ? `<img class="article-thumb" src="${image}" alt="" loading="lazy">`
                                : `<div class="article-thumb-placeholder"></div>`
                        }
                    </div>
                    <div class="article-info">
                        <div class="article-source">${escapeHtml(feed.title)}</div>
                        <div class="article-title">${escapeHtml(title)}</div>
                        <div class="article-date">${formatDate(date)}</div>
                        <div class="article-excerpt">${escapeHtml(excerpt)}${excerpt.length >= 140 ? "…" : ""}</div>
                    </div>
                `;
                if (image) {
                    const thumbImg = card.querySelector(".article-thumb");
                    if (thumbImg) {
                        thumbImg.addEventListener("error", () => {
                            const idx = featuredArticles.findIndex(
                                (fa) => fa.item === item,
                            );
                            if (idx !== -1) {
                                featuredArticles.splice(idx, 1);
                                featuredIndex = Math.min(
                                    featuredIndex,
                                    Math.max(0, featuredArticles.length - 1),
                                );
                                buildCarousel();
                            }
                        }, { once: true });
                    }
                }
                const fDomain = feed.url ? feedDomain(feed) : null;
                let fRgb = fDomain ? domainColorCache[fDomain] : null;
                const fSrcEl = card.querySelector(".article-source");
                const applyFeaturedColor = (rgb) => {
                    if (fSrcEl) fSrcEl.style.color = `rgb(${rgb})`;
                    card.style.setProperty(
                        "--card-thumb-color",
                        `rgba(${rgb}, 0.5)`,
                    );
                    card.style.setProperty("--item-accent", `rgb(${rgb})`);
                };
                if (fRgb) {
                    applyFeaturedColor(fRgb);
                } else if (fDomain) {
                    resolveColor(fDomain).then((rgb) => {
                        if (!rgb) return;
                        fRgb = rgb;
                        applyFeaturedColor(rgb);
                    });
                }
                card.addEventListener("click", () =>
                    showArticle(item, card, link, feed.title, fRgb, fDomain),
                );
                return card;
            }

            let _carouselTimer = null;

            function startCarouselTimer() {
                stopCarouselTimer();
                _carouselTimer = setInterval(() => {
                    const track = document.getElementById("featured-track");
                    if (!track) {
                        stopCarouselTimer();
                        return;
                    }
                    featuredIndex =
                        (featuredIndex + 1) % featuredArticles.length;
                    track.classList.add("slow-advance");
                    positionCarousel();
                    setTimeout(
                        () => track.classList.remove("slow-advance"),
                        700,
                    );
                }, 12000);
            }

            function stopCarouselTimer() {
                clearInterval(_carouselTimer);
                _carouselTimer = null;
            }

            function buildCarousel() {
                const section = document.getElementById("featured-section");
                if (!section || featuredArticles.length === 0) return;

                section.innerHTML = `
                    <button class="featured-arrow" id="featured-prev"><span class="material-symbols-rounded" style="font-size:28px">chevron_left</span></button>
                    <div id="featured-overflow">
                        <div id="featured-track"></div>
                    </div>
                    <button class="featured-arrow" id="featured-next"><span class="material-symbols-rounded" style="font-size:28px">chevron_right</span></button>
                    <div id="featured-dots"></div>
                `;

                const track = document.getElementById("featured-track");
                featuredArticles.forEach(({ feed, item }) =>
                    track.appendChild(makeFeaturedCard(feed, item)),
                );

                const dotsEl = document.getElementById("featured-dots");
                featuredArticles.forEach((_, i) => {
                    const dot = document.createElement("span");
                    dot.className = "featured-dot" + (i === 0 ? " active" : "");
                    dotsEl.appendChild(dot);
                });

                const overflow = document.getElementById("featured-overflow");

                document
                    .getElementById("featured-prev")
                    .addEventListener("click", () => {
                        featuredIndex =
                            (featuredIndex - 1 + featuredArticles.length) %
                            featuredArticles.length;
                        positionCarousel();
                        startCarouselTimer();
                    });
                document
                    .getElementById("featured-next")
                    .addEventListener("click", () => {
                        featuredIndex =
                            (featuredIndex + 1) % featuredArticles.length;
                        positionCarousel();
                        startCarouselTimer();
                    });

                // Pause on hover, resume on leave
                overflow.addEventListener("mouseenter", stopCarouselTimer);
                overflow.addEventListener("mouseleave", startCarouselTimer);

                // Touch swipe support
                let _touchStartX = null;
                let _touchStartY = null;
                let _touchLocked = false;
                overflow.addEventListener(
                    "touchstart",
                    (e) => {
                        _touchStartX = e.touches[0].clientX;
                        _touchStartY = e.touches[0].clientY;
                        _touchLocked = false;
                        stopCarouselTimer();
                    },
                    { passive: true },
                );
                overflow.addEventListener(
                    "touchmove",
                    (e) => {
                        if (_touchStartX === null) return;
                        const dx = e.touches[0].clientX - _touchStartX;
                        const dy = e.touches[0].clientY - _touchStartY;
                        if (!_touchLocked) {
                            // Lock axis on first significant move
                            if (
                                Math.abs(dx) > Math.abs(dy) &&
                                Math.abs(dx) > 6
                            ) {
                                _touchLocked = "h";
                            } else if (Math.abs(dy) > 6) {
                                _touchLocked = "v";
                            }
                        }
                        if (_touchLocked === "h") e.preventDefault();
                    },
                    { passive: false },
                );
                overflow.addEventListener(
                    "touchend",
                    (e) => {
                        if (_touchStartX === null || _touchLocked !== "h") {
                            _touchStartX = null;
                            startCarouselTimer();
                            return;
                        }
                        const dx = e.changedTouches[0].clientX - _touchStartX;
                        _touchStartX = null;
                        if (Math.abs(dx) > 40) {
                            featuredIndex =
                                dx < 0
                                    ? (featuredIndex + 1) %
                                      featuredArticles.length
                                    : (featuredIndex -
                                          1 +
                                          featuredArticles.length) %
                                      featuredArticles.length;
                            positionCarousel();
                        }
                        startCarouselTimer();
                    },
                    { passive: true },
                );

                const updateNarrow = () => {
                    const narrow = window.innerWidth < 800;
                    track.querySelectorAll(".featured-card").forEach(c =>
                        c.classList.toggle("narrow", narrow)
                    );
                };
                updateNarrow();
                window.addEventListener("resize", updateNarrow);

                requestAnimationFrame(() => {
                    positionCarousel(false);
                    if (!_featuredAutoSelected) {
                        _featuredAutoSelected = true;
                        enterFeaturedZone();
                    }
                });
                startCarouselTimer();
            }

            function appendFeaturedCard(feed, item) {
                const track = document.getElementById("featured-track");
                if (!track) return;
                track.appendChild(makeFeaturedCard(feed, item));
                positionCarousel();
            }

            function positionCarousel(animate = true) {
                const overflow = document.getElementById("featured-overflow");
                const track = document.getElementById("featured-track");
                if (!overflow || !track) return;

                const cards = [...track.children];
                if (!cards.length) return;

                const n = cards.length;
                const isNarrow = cards[0].classList.contains("narrow");
                const cardWidth = cards[0].offsetWidth;
                const gap = isNarrow
                    ? Math.max(8, Math.min(16, Math.round(overflow.offsetWidth * 0.03)))
                    : Math.max(
                    100,
                    Math.min(280, Math.round(overflow.offsetWidth * 0.13)),
                );
                const centerX = overflow.offsetWidth / 2 - cardWidth / 2;

                const needsTransitionReset = [];

                cards.forEach((card, i) => {
                    let dist = i - featuredIndex;
                    if (dist > n / 2) dist -= n;
                    if (dist < -n / 2) dist += n;

                    // Compare against stored previous dist to detect any large
                    // jump — including the case where dist goes from +2 to -2
                    // without triggering the modular-wrap check above.
                    const prevDist = parseFloat(
                        card.dataset.carouselDist ?? "999",
                    );
                    const jumped = !animate || Math.abs(dist - prevDist) > 1.5;
                    card.dataset.carouselDist = dist;

                    const x = centerX + dist * (cardWidth + gap);
                    const scale = isNarrow
                        ? (dist === 0 ? 1 : 0.88)
                        : (dist === 0 ? 1.25 : 1);

                    if (jumped) {
                        card.style.transition = "none";
                        card.style.transform = `translateX(${x}px) scale(${scale})`;
                        needsTransitionReset.push(card);
                    } else {
                        card.style.transform = `translateX(${x}px) scale(${scale})`;
                    }

                    card.classList.toggle("dimmed", dist !== 0);
                    card.classList.toggle("focused", dist === 0);

                    if (dist === 0) {
                        const thumb = card.querySelector(".article-thumb, .article-thumb-placeholder");
                        if (thumb && !card.classList.contains("zooming")) {
                            thumb.style.animation = "none";
                            void thumb.offsetWidth;
                            thumb.style.animation = "";
                            card.classList.add("zooming");
                        }
                    } else {
                        card.classList.remove("zooming");
                        const thumb = card.querySelector(".article-thumb, .article-thumb-placeholder");
                        if (thumb) thumb.style.animation = "";
                    }
                });

                if (needsTransitionReset.length) {
                    requestAnimationFrame(() =>
                        requestAnimationFrame(() =>
                            needsTransitionReset.forEach(
                                (c) => (c.style.transition = ""),
                            ),
                        ),
                    );
                }

                if (featuredArticles[featuredIndex]) {
                    setBackdropImage(
                        getImage(featuredArticles[featuredIndex].item),
                    );
                }

                const dots = document.querySelectorAll(".featured-dot");
                const activeAccent = cards[featuredIndex]
                    ?.style.getPropertyValue("--item-accent") || "";
                dots.forEach((d, i) => {
                    d.classList.toggle("active", i === featuredIndex);
                    d.style.background = i === featuredIndex && activeAccent
                        ? activeAccent : "";
                });
            }

            // ── Feed-page cache (only read/written by populateFeedGrid) ──
            const FEED_PAGE_TTL = 30 * 60 * 1000;

            function getFeedPageCache(url) {
                try {
                    const raw = localStorage.getItem("fp:" + url);
                    if (!raw) return null;
                    const { ts, xml } = JSON.parse(raw);
                    if (Date.now() - ts > FEED_PAGE_TTL) {
                        localStorage.removeItem("fp:" + url);
                        return null;
                    }
                    return xml;
                } catch (e) {
                    return null;
                }
            }

            function setFeedPageCache(url, xml) {
                try {
                    localStorage.setItem("fp-ok:" + url, "1");
                    localStorage.setItem(
                        "fp:" + url,
                        JSON.stringify({ ts: Date.now(), xml }),
                    );
                } catch (e) {
                    // Quota exceeded — evict all feed-page entries and retry once
                    try {
                        Object.keys(localStorage)
                            .filter((k) => k.startsWith("fp:"))
                            .forEach((k) => localStorage.removeItem(k));
                        localStorage.setItem(
                            "fp:" + url,
                            JSON.stringify({ ts: Date.now(), xml }),
                        );
                    } catch (e2) {}
                }
            }

            async function populateFeedGrid(feed) {
                const myId = ++populateFeedGridId;
                const getGrid = () => {
                    const g = document.getElementById("feed-grid");
                    return g && populateFeedGridId === myId ? g : null;
                };

                const renderItems = (g, items, animate = true) => {
                    _lazyTeardown();
                    g.innerHTML = "";
                    if (items.length === 0) {
                        g.innerHTML =
                            '<div class="placeholder">No articles found.</div>';
                        return;
                    }
                    const backdropImage = items.reduce(
                        (found, item) => found || getImage(item),
                        null,
                    );
                    if (backdropImage) {
                        const domain = feedDomain(feed);
                        const tint = domainColorCache[domain] || null;
                        setBackdropImage(backdropImage, tint);
                        if (!tint) {
                            getDominantColor(domain)
                                .then((rgb) => {
                                    if (!rgb) return;
                                    saveDomainColor(domain, rgb);
                                    if (document.getElementById("feed-grid"))
                                        setBackdropImage(backdropImage, rgb);
                                })
                                .catch(() => {});
                        }
                    }
                    const els = items.map((item, i) => {
                        const el = makeArticleEl(item, feed, false, animate);
                        if (animate) el.style.animationDelay = `${Math.min(i * 35, 400)}ms`;
                        return el;
                    });
                    if (viewMode === "masonry") {
                        const frag = document.createDocumentFragment();
                        els.forEach((el) => frag.appendChild(el));
                        g.appendChild(frag);
                        requestAnimationFrame(() => buildMasonry(g));
                    } else {
                        _lazyInit(g, els);
                    }
                };

                // Show cached cards instantly if available, otherwise show spinner
                const cachedXml = getFeedPageCache(feed.url);
                const hadCache = !!cachedXml;
                if (cachedXml) {
                    const g = getGrid();
                    if (g) {
                        const doc = new DOMParser().parseFromString(
                            cachedXml,
                            "text/xml",
                        );
                        renderItems(
                            g,
                            [...doc.querySelectorAll("item, entry")],
                            null,
                        );
                    }
                } else {
                    const g = getGrid();
                    if (g)
                        g.innerHTML =
                            '<div class="feed-loading"><div class="feed-loading-spinner"></div>Loading…</div>';
                }

                // Always fetch fresh — replace grid once it arrives
                try {
                    if (!getGrid()) return;
                    const xml = await fetchFeed(feed.url);
                    const doc = new DOMParser().parseFromString(
                        xml,
                        "text/xml",
                    );
                    const items = [...doc.querySelectorAll("item, entry")].sort(
                        (a, b) =>
                            new Date(
                                getText(b, "pubDate", "published", "updated"),
                            ) -
                            new Date(
                                getText(a, "pubDate", "published", "updated"),
                            ),
                    );
                    setFeedPageCache(feed.url, xml);

                    const g = getGrid();
                    if (!g) return;

                    if (hadCache) {
                        const freshLinks = new Set(
                            items.map((i) => getLink(i)).filter(Boolean),
                        );
                        const existingLinks = new Set(
                            [...g.querySelectorAll(".article-item")]
                                .map((el) => el.dataset.link)
                                .filter(Boolean),
                        );
                        const unchanged =
                            freshLinks.size === existingLinks.size &&
                            [...freshLinks].every((l) => existingLinks.has(l));
                        if (unchanged) return;
                    }

                    renderItems(g, items, !hadCache);
                } catch (e) {
                    logFeedError(feed.title, feed.url, e);
                    const g = getGrid();
                    if (g && !g.querySelector(".article-item")) {
                        g.innerHTML = `<div class="error">Failed to load feed.</div>`;
                    }
                }
            }

            function extractKeywords(text) {

            // Extract proper nouns and named entities from raw (mixed-case) text.
            // Works by splitting on sentence boundaries so sentence-initial capitals
            // are ignored, then collecting mid-sentence Capitalized words and
            // consecutive-capital runs ("Elon Musk", "New York City").
            function extractProperNouns(rawText) {
                const seen = new Set();
                const result = [];
                // Use null byte as a safe split sentinel
                const sentences = rawText
                    .replace(/([.!?:])\s+/g, "$1␀")
                    .split("␀");
                for (const sentence of sentences) {
                    const words = sentence.trim().split(/\s+/);
                    for (let i = 1; i < words.length; i++) {
                        // Must start with Capital + lowercase (filters ALL-CAPS acronyms)
                        if (!/^[A-Z][a-z]/.test(words[i])) continue;
                        const clean = words[i].replace(/[^A-Za-z'-]/g, "");
                        if (clean.length < 2) continue;
                        // Try to build a multi-word named entity
                        const phraseWords = [clean];
                        let j = i + 1;
                        while (
                            j < words.length &&
                            /^[A-Z][a-z]/.test(words[j])
                        ) {
                            phraseWords.push(
                                words[j].replace(/[^A-Za-z'-]/g, ""),
                            );
                            j++;
                        }
                        const singleKey = clean.toLowerCase();
                        if (!seen.has(singleKey)) {
                            seen.add(singleKey);
                            result.push(singleKey);
                        }
                        if (phraseWords.length > 1) {
                            const phraseKey = phraseWords
                                .join(" ")
                                .toLowerCase();
                            if (!seen.has(phraseKey)) {
                                seen.add(phraseKey);
                                result.push(phraseKey);
                            }
                        }
                    }
                }
                return result.slice(0, 30);
            }

            const SKIP_ANCHOR_TEXT = new Set([
                "here",
                "click here",
                "read more",

            function extractLinkedArticles(item) {
                const content =
                    getContent(item) || getText(item, "description", "summary");
                if (!content) return [];

                const articleUrl = getLink(item) || "";
                const articleBase = articleUrl
                    .split("#")[0]
                    .replace(/\/$/, "")
                    .toLowerCase();

                const isSelfOrComments = (href) => {
                    const normalized = href
                        .split("#")[0]
                        .replace(/\/$/, "")
                        .toLowerCase();
                    if (normalized === articleBase) return true;
                    // comments URL patterns
                    if (/[#?/]comments?($|[/?#])/i.test(href)) return true;
                    if (/#respond/i.test(href)) return true;
                    if (normalized === articleBase + "/comments") return true;
                    return false;
                };

                const doc = new DOMParser().parseFromString(
                    content,
                    "text/html",
                );
                const seen = new Set();
                return [...doc.querySelectorAll("a[href]")]
                    .reduce((acc, a) => {
                        const href = a.href;
                        const text = a.textContent.trim();
                        if (!href.startsWith("http")) return acc;
                        if (seen.has(href)) return acc;
                        if (text.length < 8) return acc;
                        if (SKIP_ANCHOR_TEXT.has(text.toLowerCase()))
                            return acc;
                        if (/^https?:\/\//.test(text)) return acc;
                        if (isSelfOrComments(href)) return acc;
                        seen.add(href);
                        try {
                            const domain = new URL(href).hostname.replace(
                                /^www\./,
                                "",
                            );
                            acc.push({ href, text, domain });
                        } catch (e) {}
                        return acc;
                    }, [])
                    .slice(0, 15);
            }

            function scoreRelevance(
                properNouns,
                keywords,
                titleText,
                bodyText,
                genreMatch,
            ) {
                let score = 0;
                // Proper nouns are the strongest signal
                for (const pn of properNouns) {
                    if (titleText.includes(pn)) score += 10;
                    else if (bodyText.includes(pn)) score += 4;
                }
                // Generic keywords are a weaker secondary signal
                for (const kw of keywords) {
                    if (titleText.includes(kw)) score += 2;
                    else if (bodyText.includes(kw)) score += 1;
                }
                // Genre overlap: source's genre matches current article's category
                if (genreMatch) score += 5;
                return score;
            }

            const _pageTitleCache = new Map();
            async function fetchPageTitle(url) {
                if (_pageTitleCache.has(url)) return _pageTitleCache.get(url);
                const proxies = [
                    `https://corsproxy.io/?${encodeURIComponent(url)}`,
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
                ];
                try {
                    const res = await Promise.any(
                        proxies.map((p) => fetch(p).then((r) => { if (!r.ok) throw new Error(); return r; }))
                    );
                    const html = await res.text();
                    const m = html.match(/<title[^>]*>([^<]+)<\/title>/i);
                    const title = m ? m[1].trim().replace(/\s+/g, " ") : null;
                    _pageTitleCache.set(url, title);
                    return title;
                } catch {
                    _pageTitleCache.set(url, null);
                    return null;
                }
            }
